document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 <img src=\"b431fdeb-af95-44e5-a61a-00c58e5de36d\" alt=\"Talaco Group\" style=\"height:44px;object-fit:contain;\">\n          <div style=\"width:1.5px;height:36px;background:#e2e4e8;\"><\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;line-height:1;\">\n            <span style=\"font-size:10.5px;font-weight:800;color:#b50d24;letter-spacing:2.4px;text-transform:uppercase;\">Talaco Group<\u002Fspan>\n            <span style=\"font-size:24px;font-weight:800;color:#23262b;letter-spacing:-.4px;margin-top:6px;\">Employee <span style=\"color:#b50d24;\">Directory<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- Search -->\n        <div style=\"position:relative;margin-top:18px;display:flex;align-items:center;gap:11px;background:#f0f1f4;border:1.5px solid #e6e7ea;border-radius:15px;padding:13px 15px;\">\n          <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\">\n            <circle cx=\"11\" cy=\"11\" r=\"7\" stroke=\"#9aa0a6\" stroke-width=\"2\"><\u002Fcircle>\n            <line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\" stroke=\"#9aa0a6\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline>\n          <\u002Fsvg>\n          <input value=\"{{ query }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search name, ID, title, branch…\" style=\"border:none;outline:none;background:transparent;flex:1;font-family:inherit;font-size:15px;color:#1f2328;font-weight:600;min-width:0;\">\n          <div onclick=\"{{ onClear }}\" style=\"display:{{ clearDisplay }};cursor:pointer;width:19px;height:19px;border-radius:50%;background:#c4c7cc;align-items:center;justify-content:center;flex:none;\" hint-placeholder-val=\"\">\n            <svg width=\"9\" height=\"9\" viewBox=\"0 0 12 12\"><path d=\"M1 1L11 11M11 1L1 11\" stroke=\"#fff\" stroke-width=\"2.2\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Department filter chips -->\n      <div class=\"chiprow\" style=\"display:flex;gap:8px;overflow-x:auto;padding:13px 20px 3px;scrollbar-width:none;\">\n        <sc-for list=\"{{ chips }}\" as=\"c\" hint-placeholder-count=\"6\">\n          <div onclick=\"{{ c.onClick }}\" style=\"flex:none;cursor:pointer;display:flex;align-items:center;gap:7px;padding:8px 14px;border-radius:11px;font-size:13px;font-weight:700;letter-spacing:.2px;white-space:nowrap;background:{{ c.bg }};color:{{ c.color }};border:1.5px solid {{ c.border }};box-shadow:{{ c.shadow }};\">\n            <span>{{ c.label }}<\u002Fspan>\n            <span style=\"font-size:11px;font-weight:800;color:{{ c.countColor }};\">{{ c.count }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <!-- Count row -->\n      <div style=\"display:flex;align-items:center;justify-content:space-between;padding:11px 22px 12px;\">\n        <span style=\"font-size:11.5px;font-weight:800;color:#8a9099;letter-spacing:1.3px;text-transform:uppercase;\">{{ countLabel }}<\u002Fspan>\n        <span style=\"font-size:11.5px;font-weight:700;color:{{ syncColor }};letter-spacing:.3px;\">{{ syncLabel }}<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- List -->\n    <div style=\"padding:4px 14px 32px;display:flex;flex-direction:column;gap:11px;\">\n      <sc-for list=\"{{ visible }}\" as=\"emp\" hint-placeholder-count=\"8\">\n        <div style=\"background:#ffffff;border-radius:18px;box-shadow:0 6px 18px -10px rgba(16,24,40,.18),0 1px 2px rgba(16,24,40,.05);overflow:hidden;\">\n          <!-- Main row -->\n          <div style=\"padding:14px;display:flex;align-items:center;gap:13px;\">\n            <!-- ID badge -->\n            <div onclick=\"{{ emp.onToggle }}\" style=\"flex:none;cursor:pointer;width:54px;height:54px;border-radius:17px;background:linear-gradient(150deg,#e21f3c 0%,#b50d24 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;line-height:1;box-shadow:0 8px 18px -6px rgba(181,13,36,.6);border:1px solid rgba(255,255,255,.18);\">\n              <span style=\"font-size:8px;font-weight:800;color:rgba(255,255,255,.75);letter-spacing:1.2px;\">ID<\u002Fspan>\n              <span style=\"font-size:15px;font-weight:800;color:#fff;margin-top:2px;letter-spacing:.2px;\">{{ emp.id }}<\u002Fspan>\n            <\u002Fdiv>\n\n            <!-- Info (tap to expand) -->\n            <div onclick=\"{{ emp.onToggle }}\" style=\"flex:1;min-width:0;cursor:pointer;display:flex;flex-direction:column;gap:3px;\">\n              <span class=\"clamp1\" style=\"font-size:9.5px;font-weight:800;color:#9aa0a6;letter-spacing:1.2px;text-transform:uppercase;\">{{ emp.dept }}<\u002Fspan>\n              <span class=\"clamp1\" style=\"font-size:16px;font-weight:800;color:#1a1c1f;letter-spacing:-.2px;\">{{ emp.name }}<\u002Fspan>\n              <span class=\"clamp1\" style=\"font-size:12px;font-weight:700;color:#b50d24;\">{{ emp.title }}<\u002Fspan>\n              <div style=\"display:flex;align-items:center;gap:6px;margin-top:2px;\">\n                <svg width=\"12\" height=\"12\" viewBox=\"0 0 24 24\" fill=\"#9aa0a6\" style=\"flex:none;\"><path d=\"M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:13.5px;font-weight:600;color:#5a6068;letter-spacing:.2px;\">{{ emp.phoneDisplay }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- Actions -->\n            <div style=\"flex:none;display:flex;flex-direction:column;gap:9px;\">\n              <a href=\"{{ emp.waLink }}\" target=\"_blank\" rel=\"noopener\" style=\"text-decoration:none;width:41px;height:41px;border-radius:13px;background:linear-gradient(150deg,#2ee06f,#1faf56);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 14px -5px rgba(37,211,102,.6);\" style-active=\"transform:scale(.9)\">\n                <svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"#fff\"><path d=\"M12.04 2C6.58 2 2.13 6.45 2.13 11.91c0 1.75.46 3.45 1.32 4.95L2 22l5.25-1.38a9.9 9.9 0 004.79 1.22h.01c5.46 0 9.9-4.45 9.9-9.91 0-2.65-1.03-5.14-2.9-7.01A9.82 9.82 0 0012.04 2zm0 1.67c2.2 0 4.27.86 5.82 2.42a8.19 8.19 0 012.41 5.82c0 4.54-3.69 8.23-8.24 8.23h-.01a8.2 8.2 0 01-4.18-1.15l-.3-.18-3.11.82.83-3.04-.2-.31a8.18 8.18 0 01-1.26-4.37c0-4.54 3.7-8.24 8.24-8.24zm-3.4 4.32c-.16 0-.42.06-.64.3-.22.24-.84.82-.84 2.01s.86 2.33.98 2.49c.12.16 1.69 2.58 4.1 3.62.57.25 1.02.4 1.37.5.57.19 1.1.16 1.51.1.46-.07 1.42-.58 1.62-1.14.2-.56.2-1.04.14-1.14-.06-.1-.22-.16-.46-.28-.24-.12-1.42-.7-1.64-.78-.22-.08-.38-.12-.54.12-.16.24-.62.78-.76.94-.14.16-.28.18-.52.06-.24-.12-1.01-.37-1.93-1.19-.71-.64-1.19-1.42-1.33-1.66-.14-.24-.01-.37.11-.49.11-.11.24-.28.36-.42.12-.14.16-.24.24-.4.08-.16.04-.3-.02-.42-.06-.12-.54-1.3-.74-1.78-.2-.47-.4-.4-.54-.41h-.46z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fa>\n              <a href=\"{{ emp.telLink }}\" style=\"text-decoration:none;width:41px;height:41px;border-radius:13px;background:#fff;border:1.5px solid #ececef;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 8px -4px rgba(16,24,40,.18);\" style-active=\"transform:scale(.9)\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"#b50d24\"><path d=\"M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1-.2 1.1.4 2.3.6 3.6.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.2.2 2.4.6 3.6.1.4 0 .8-.3 1l-2.2 2.2z\"><\u002Fpath><\u002Fsvg>\n              <\u002Fa>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Expanded details -->\n          <sc-if value=\"{{ emp.expanded }}\" hint-placeholder-val=\"\">\n            <div style=\"border-top:1px solid #f0f1f3;padding:12px 16px 14px;display:flex;flex-direction:column;gap:10px;background:#fafbfc;\">\n              <div style=\"display:flex;align-items:center;gap:9px;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\"><path d=\"M12 21s-7-5.2-7-10.5A7 7 0 0119 10.5C19 15.8 12 21 12 21z\" stroke=\"#9aa0a6\" stroke-width=\"1.8\"><\u002Fpath><circle cx=\"12\" cy=\"10.5\" r=\"2.4\" stroke=\"#9aa0a6\" stroke-width=\"1.8\"><\u002Fcircle><\u002Fsvg>\n                <span style=\"font-size:13px;font-weight:600;color:#5a6068;\">{{ emp.branchDisplay }}<\u002Fspan>\n              <\u002Fdiv>\n              <a href=\"{{ emp.mailLink }}\" style=\"display:{{ emp.emailDisplay }};align-items:center;gap:9px;text-decoration:none;\">\n                <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" style=\"flex:none;\"><rect x=\"3\" y=\"5\" width=\"18\" height=\"14\" rx=\"2.5\" stroke=\"#b50d24\" stroke-width=\"1.8\"><\u002Frect><path d=\"M4 7l8 6 8-6\" stroke=\"#b50d24\" stroke-width=\"1.8\"><\u002Fpath><\u002Fsvg>\n                <span style=\"font-size:13px;font-weight:700;color:#b50d24;word-break:break-all;\">{{ emp.email }}<\u002Fspan>\n              <\u002Fa>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n\n      <!-- No results -->\n      <sc-if value=\"{{ isEmpty }}\" hint-placeholder-val=\"\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:54px 24px;text-align:center;gap:11px;\">\n          <div style=\"width:64px;height:64px;border-radius:20px;background:#e3e6ea;display:flex;align-items:center;justify-content:center;\">\n            <svg width=\"28\" height=\"28\" viewBox=\"0 0 24 24\" fill=\"none\"><circle cx=\"11\" cy=\"11\" r=\"7\" stroke=\"#b3b8bf\" stroke-width=\"2\"><\u002Fcircle><line x1=\"16.5\" y1=\"16.5\" x2=\"21\" y2=\"21\" stroke=\"#b3b8bf\" stroke-width=\"2\" stroke-linecap=\"round\"><\u002Fline><\u002Fsvg>\n          <\u002Fdiv>\n          <span style=\"font-size:15px;font-weight:800;color:#5a6068;\">No employees found<\u002Fspan>\n          <span style=\"font-size:13px;color:#9aa0a6;font-weight:500;\">Try a different name, ID, title or department<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Loading -->\n      <sc-if value=\"{{ isLoading }}\" hint-placeholder-val=\"\">\n        <div style=\"display:flex;flex-direction:column;align-items:center;justify-content:center;padding:54px 24px;text-align:center;gap:8px;\">\n          <span style=\"font-size:14px;font-weight:800;color:#8a9099;\">Loading directory…<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:600,&quot;height&quot;:960}}\">\nclass Component extends DCLogic {\n  state = {\n    query: \"\",\n    dept: \"All\",\n    expandedId: null,\n    employees: this.bake((typeof window !== \"undefined\" && window.TALACO_CONTACTS) || []),\n    synced: false,\n  };\n\n  bake(tuples) {\n    return (tuples || []).map(t => ({\n      id: t[0], first: t[1], last: t[2], phone: t[3], title: t[4], company: t[5], email: t[6], department: t[7] || \"\",\n    }));\n  }\n\n  // derive a department bucket from the job title (used when no Department column exists)\n  deriveDept(title) {\n    const t = (title || \"\").toUpperCase();\n    if (!t) return \"Other\";\n    if (/CEO|CHAIRMAN|CHAIR|FOUNDER|PRESIDENT|MANAGING DIRECTOR|GENERAL MANAGER|\\bCFO\\b|\\bCOO\\b|\\bCTO\\b|HEAD OFFICE/.test(t)) return \"Management\";\n    if (/ACCOUNTANT|ACCOUNTING|FINANC|TREASUR|AUDIT|TAXATION|BUDGET|PAYROLL/.test(t)) return \"Finance\";\n    if (/HUMAN RESOURCE|\\bHR\\b|RECRUIT|TALENT/.test(t)) return \"HR\";\n    if (/\\bIT\\b|SOFTWARE|DEVELOPER|PROGRAMMER|\\bDATA\\b|SYSTEM|NETWORK|TECHNICAL|DEVOPS|\\bQA\\b|SECURITY|INFRASTRUCTURE/.test(t)) return \"IT\";\n    if (/SALES|BUSINESS|MARKET|COMMERCIAL|\\bBRAND\\b/.test(t)) return \"Sales & Marketing\";\n    if (/CUSTOMER|SERVICE REPRESENTATIVE|SUPPORT|CALL CENTER|CASHIER|TELLER|FRONT DESK|\\bAGENT\\b/.test(t)) return \"Customer Service\";\n    if (/LOGISTIC|WAREHOUSE|DRIVER|DELIVERY|SUPPLY|PROCUREMENT|OPERATION|DISPATCH/.test(t)) return \"Operations\";\n    if (/LEGAL|COMPLIANCE|\\bRISK\\b|REGULAT/.test(t)) return \"Legal & Compliance\";\n    if (/ADMIN|OFFICE|RECEPTION|SECRETARY|ASSISTANT|COORDINATOR|CLERK/.test(t)) return \"Administration\";\n    return \"Other\";\n  }\n\n  departmentOf(e) {\n    return (e.department || \"\").trim() || this.deriveDept(e.title);\n  }\n\n  componentDidMount() {\n    this.hydrate(0);\n    this.sync();\n  }\n\n  async sync() {\n    if (await this.syncFromJson()) return;\n    await this.syncFromXlsx();\n  }\n\n  async syncFromJson() {\n    try {\n      const res = await fetch(\"./contacts.json\", { cache: \"no-store\" });\n      if (!res.ok) return false;\n      const data = await res.json();\n      const tuples = (Array.isArray(data) && data.length && Array.isArray(data[0])) ? data : this.fromObjects(data);\n      if (tuples && tuples.length) {\n        this.setState({ employees: this.bake(tuples), synced: true });\n        try { localStorage.setItem(\"talaco_contacts\", JSON.stringify(tuples)); } catch (e) {}\n        return true;\n      }\n    } catch (e) {}\n    return false;\n  }\n\n  fromObjects(arr) {\n    const norm = k => (k || \"\").toLowerCase().replace(/[^a-z]/g, \"\");\n    return (arr || []).map(o => {\n      const find = names => { for (const k of Object.keys(o)) { if (names.indexOf(norm(k)) !== -1) return o[k]; } return \"\"; };\n      return [\n        find([\"employeeid\", \"id\"]), find([\"firstname\", \"first\"]), find([\"lastname\", \"last\"]),\n        find([\"phone\", \"mobile\", \"phonenumber\"]), find([\"jobtitle\", \"title\", \"position\"]),\n        find([\"company\", \"branch\"]), find([\"email\", \"mail\"]), find([\"department\", \"dept\", \"division\"]),\n      ].map(v => (v == null ? \"\" : (\"\" + v).trim()));\n    });\n  }\n\n  hydrate(tries) {\n    if (this.state.employees.length) return;\n    const t = (typeof window !== \"undefined\" && window.TALACO_CONTACTS) || null;\n    if (Array.isArray(t) && t.length) { this.setState({ employees: this.bake(t) }); return; }\n    try { const c = localStorage.getItem(\"talaco_contacts\"); if (c) { const ct = JSON.parse(c); if (ct && ct.length) { this.setState({ employees: this.bake(ct) }); return; } } } catch (e) {}\n    if (tries < 60) setTimeout(() => this.hydrate(tries + 1), 100);\n  }\n\n  async syncFromXlsx() {\n    try {\n      const res = await fetch(\"./Talaco_Employee_Directory.xlsx\", { cache: \"no-store\" });\n      if (!res.ok) return;\n      const buf = new Uint8Array(await res.arrayBuffer());\n      const tuples = await this.parseXlsx(buf);\n      if (tuples && tuples.length) {\n        this.setState({ employees: this.bake(tuples), synced: true });\n        try { localStorage.setItem(\"talaco_contacts\", JSON.stringify(tuples)); } catch (e) {}\n      }\n    } catch (e) {}\n  }\n\n  async parseXlsx(buf) {\n    const dv = new DataView(buf.buffer, buf.byteOffset, buf.byteLength);\n    let eocd = -1;\n    for (let i = buf.length - 22; i >= 0; i--) { if (dv.getUint32(i, true) === 0x06054b50) { eocd = i; break; } }\n    if (eocd < 0) return null;\n    const cdCount = dv.getUint16(eocd + 10, true);\n    const cdOff = dv.getUint32(eocd + 16, true);\n    const inflate = async (u8) => { const ds = new DecompressionStream(\"deflate-raw\"); const w = ds.writable.getWriter(); w.write(u8); w.close(); return new Uint8Array(await new Response(ds.readable).arrayBuffer()); };\n    const td = new TextDecoder();\n    const files = {};\n    let p = cdOff;\n    for (let n = 0; n < cdCount; n++) {\n      const method = dv.getUint16(p + 10, true), compSize = dv.getUint32(p + 20, true), nameLen = dv.getUint16(p + 28, true), extraLen = dv.getUint16(p + 30, true), commentLen = dv.getUint16(p + 32, true), localOff = dv.getUint32(p + 42, true);\n      const name = td.decode(buf.slice(p + 46, p + 46 + nameLen));\n      const lnameLen = dv.getUint16(localOff + 26, true), lextraLen = dv.getUint16(localOff + 28, true);\n      const dataStart = localOff + 30 + lnameLen + lextraLen;\n      const comp = buf.slice(dataStart, dataStart + compSize);\n      files[name] = td.decode(method === 8 ? await inflate(comp) : comp);\n      p += 46 + nameLen + extraLen + commentLen;\n    }\n    const dec = s => (s || \"\").replace(/&amp;/g, \"&\").replace(/&lt;/g, \"<\").replace(/&gt;/g, \">\").replace(/&quot;/g, '\"').replace(/&#39;/g, \"'\");\n    const ss = [];\n    const sx = files[\"xl/sharedStrings.xml\"] || \"\";\n    let m; const re = /<si>([\\s\\S]*?)<\\/si>/g;\n    while ((m = re.exec(sx))) { const parts = [...m[1].matchAll(/<t[^>]*>([\\s\\S]*?)<\\/t>/g)].map(x => x[1]); ss.push(dec(parts.join(\"\"))); }\n    const sheet = files[\"xl/worksheets/sheet1.xml\"] || \"\";\n    const rows = [...sheet.matchAll(/<row[^>]*r=\"(\\d+)\"[^>]*>([\\s\\S]*?)<\\/row>/g)];\n    const clean = s => dec(s || \"\").trim();\n    const cre = /<c r=\"([A-Z]+)\\d+\"(?:[^>]*t=\"([^\"]*)\")?[^>]*>(?:<v>([\\s\\S]*?)<\\/v>|<is><t[^>]*>([\\s\\S]*?)<\\/t><\\/is>)?<\\/c>/g;\n    const cellsOf = body => { const cells = {}; let cm; cre.lastIndex = 0; while ((cm = cre.exec(body))) { let v = cm[3] !== undefined ? cm[3] : (cm[4] !== undefined ? cm[4] : \"\"); if (cm[2] === \"s\") v = ss[+v]; cells[cm[1]] = v; } return cells; };\n    const norm = k => (k || \"\").toLowerCase().replace(/[^a-z]/g, \"\");\n    const fieldOf = { employeeid: \"id\", id: \"id\", firstname: \"first\", lastname: \"last\", phone: \"phone\", phonenumber: \"phone\", mobile: \"phone\", jobtitle: \"title\", position: \"title\", company: \"company\", branch: \"company\", department: \"department\", dept: \"department\", division: \"department\", email: \"email\", mail: \"email\" };\n    // locate the header row, then map columns by their header text (order-independent)\n    let headerIdx = -1; const colMap = {};\n    for (let i = 0; i < rows.length; i++) {\n      const cells = cellsOf(rows[i][2]);\n      const vals = Object.values(cells).map(norm);\n      if (vals.indexOf(\"firstname\") !== -1 && vals.indexOf(\"lastname\") !== -1) {\n        headerIdx = i;\n        for (const col of Object.keys(cells)) { const f = fieldOf[norm(cells[col])]; if (f) colMap[col] = f; }\n        break;\n      }\n    }\n    if (headerIdx < 0) return null;\n    const out = [];\n    for (let i = headerIdx + 1; i < rows.length; i++) {\n      const cells = cellsOf(rows[i][2]);\n      const rec = {};\n      for (const col of Object.keys(colMap)) rec[colMap[col]] = clean(cells[col]);\n      if (!rec.first && !rec.last && !rec.phone) continue;\n      out.push([rec.id || \"\", rec.first || \"\", rec.last || \"\", rec.phone || \"\", rec.title || \"\", rec.company || \"\", rec.email || \"\", rec.department || \"\"]);\n    }\n    return out;\n  }\n\n  renderVals() {\n    const q = this.state.query.trim().toLowerCase();\n    const sel = this.state.dept;\n    const exp = this.state.expandedId;\n    const digits = p => (p || \"\").replace(/[^0-9]/g, \"\");\n\n    const all = this.state.employees.map((e, i) => {\n      const name = [e.first, e.last].filter(Boolean).join(\" \");\n      const d = digits(e.phone);\n      const dept = this.departmentOf(e);\n      return {\n        uid: i,\n        id: e.id || \"—\",\n        name: name || \"(no name)\",\n        title: e.title || \"\",\n        dept,\n        branchDisplay: e.company || \"—\",\n        phoneDisplay: e.phone || \"—\",\n        telLink: \"tel:\" + d,\n        waLink: \"https://wa.me/\" + d,\n        email: e.email || \"\",\n        mailLink: e.email ? \"mailto:\" + e.email : \"#\",\n        emailDisplay: e.email ? \"flex\" : \"none\",\n        expanded: exp === i,\n        onToggle: () => this.setState(s => ({ expandedId: s.expandedId === i ? null : i })),\n        blob: (name + \" \" + (e.id || \"\") + \" \" + (e.title || \"\") + \" \" + (e.company || \"\") + \" \" + dept + \" \" + (e.phone || \"\") + \" \" + (e.email || \"\")).toLowerCase(),\n      };\n    });\n\n    let visible = sel === \"All\" ? all : all.filter(e => e.dept === sel);\n    if (q) visible = visible.filter(e => e.blob.indexOf(q) !== -1);\n\n    const counts = {}; all.forEach(e => counts[e.dept] = (counts[e.dept] || 0) + 1);\n    const order = [\"Management\", \"Finance\", \"HR\", \"IT\", \"Sales & Marketing\", \"Customer Service\", \"Operations\", \"Administration\", \"Legal & Compliance\"];\n    const ranked = order.filter(d => counts[d]);\n    const extras = Object.keys(counts).filter(d => order.indexOf(d) === -1 && d !== \"Other\").sort((a, b) => counts[b] - counts[a]);\n    const chipNames = [\"All\", ...ranked, ...extras, ...(counts[\"Other\"] ? [\"Other\"] : [])];\n    const chips = chipNames.map(name => {\n      const active = name === sel;\n      return {\n        label: name,\n        count: name === \"All\" ? all.length : counts[name],\n        bg: active ? \"linear-gradient(150deg,#e21f3c,#b50d24)\" : \"#ffffff\",\n        color: active ? \"#ffffff\" : \"#5a6068\",\n        countColor: active ? \"rgba(255,255,255,.75)\" : \"#b0b5bc\",\n        border: active ? \"transparent\" : \"#e6e7ea\",\n        shadow: active ? \"0 6px 14px -6px rgba(181,13,36,.55)\" : \"none\",\n        onClick: () => this.setState({ dept: name, expandedId: null }),\n      };\n    });\n\n    return {\n      query: this.state.query,\n      visible,\n      chips,\n      isLoading: all.length === 0,\n      isEmpty: all.length > 0 && visible.length === 0,\n      countLabel: all.length ? (visible.length + \" of \" + all.length + \" employees\") : \"Loading…\",\n      syncLabel: this.state.synced ? \"● Synced\" : \"Live directory\",\n      syncColor: this.state.synced ? \"#1faf56\" : \"#bcc1c8\",\n      clearDisplay: this.state.query ? \"flex\" : \"none\",\n      onSearch: e => this.setState({ query: e.target.value }),\n      onClear: () => this.setState({ query: \"\" }),\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
